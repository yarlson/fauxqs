# Used by docker-s3-storage-acceptance.ts Scenario 4.
# Tests that FAUXQS_S3_STORAGE_DIR works end-to-end in docker-compose.

services:
  fauxqs:
    image: ${FAUXQS_TEST_IMAGE:-fauxqs-s3-storage-test}
    ports:
      - "${FAUXQS_TEST_PORT:-14568}:4566"
    environment:
      - FAUXQS_S3_STORAGE_DIR=/s3data
    volumes:
      - s3-storage:/s3data

volumes:
  s3-storage:
