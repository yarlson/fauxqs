services:
  fauxqs:
    image: kibertoad/fauxqs:latest
    ports:
      - "4566:4566"
    environment:
      - FAUXQS_INIT=/app/init.json
      - FAUXQS_HOST=fauxqs
      # - FAUXQS_S3_STORAGE_DIR=/s3data      # store S3 objects as files (see README)
    volumes:
      - ./init.json:/app/init.json
      # - ./local-s3:/s3data                 # bind-mount for inspectable S3 files
    # The Docker image has a built-in HEALTHCHECK — no need to define one here.

  app:
    build: .
    depends_on:
      fauxqs:
        condition: service_healthy
    environment:
      - FAUXQS_ENDPOINT=http://fauxqs:4566
